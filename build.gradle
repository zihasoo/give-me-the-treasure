plugins {
    id 'java'
    id 'org.openjfx.javafxplugin' version '0.1.0'
    id 'application'
}

group = 'com.oop'
version = '1.0'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

javafx {
    version = '21'
    modules = ['javafx.controls', 'javafx.fxml']
}

application {
    mainClass = 'com.oop.payday.Main'
    applicationDefaultJvmArgs = [
        // JavaFX 21 을 Java 25 에서 실행할 때 뜨는 네이티브 접근 경고 억제.
        '--enable-native-access=javafx.graphics',
        // Windows 콘솔(cp949)에서 한글 로그가 깨지지 않도록 표준 출력/오류 인코딩을 UTF-8 로.
        '-Dstdout.encoding=UTF-8',
        '-Dstderr.encoding=UTF-8'
    ]
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.4'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform {
        excludeTags 'integration'
    }
}

tasks.register('integrationTest', Test) {
    description = 'Runs slower integration-style tests.'
    group = 'verification'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnitPlatform {
        includeTags 'integration'
    }
    // 봇 A/B 표본 수를 CLI 로 조절: -DbotSeedCount=300 (기본 20). 큰 표본으로 승률 신호를 확인할 때 쓴다.
    systemProperty 'botSeedCount', System.getProperty('botSeedCount', '20')
    // 봇 후보 점수 내역(logs/bot-scores.log) 기록: -Dbot.debugScores=true (기본 false). 패배 로그 진단용.
    systemProperty 'bot.debugScores', System.getProperty('bot.debugScores', 'false')
    shouldRunAfter test
    testLogging {
        showStandardStreams = true
    }
}
